<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/tokens/colors.css">
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/tokens/typography.css">
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/tokens/base.css">
  <link rel="stylesheet" href="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/styles.css">
  <script src="_ds/optizone-design-system-ded4a566-9347-4dcc-a174-526e56559ca9/_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="image-slot.js"></script>
  <style>
    body { margin: 0; background: var(--bg-page); }
    @keyframes oz-fade-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    @keyframes oz-fade   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes oz-scale-in { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: none; } }
    @keyframes oz-slide-in-end { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    @keyframes oz-slide-down { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }
    @keyframes oz-scan { 0% { top: 8%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 88%; opacity: 0; } }
    @keyframes oz-shimmer { 100% { background-position: 200% 0; } }
    @keyframes oz-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes oz-ring { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }
    [data-oz-reveal] { opacity: 0; transform: translateY(20px); transition: opacity var(--dur-slow) var(--ease-out), transform var(--dur-slow) var(--ease-out); will-change: opacity, transform; }
    [data-oz-reveal][data-oz-in] { opacity: 1; transform: none; }
    .oz-route { animation: oz-fade-up var(--dur-slow) var(--ease-out) both; }
    .oz-scan-line { position: absolute; left: 8%; right: 8%; height: 2px; background: linear-gradient(90deg, transparent, var(--amber-500), transparent); animation: oz-scan 2.6s var(--ease-in-out) infinite; }
    a, button { transition: color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
      [data-oz-reveal] { opacity: 1 !important; transform: none !important; }
    }
  </style>
</helmet>
<div data-screen-label="OPTIZONE storefront" style="min-height: 100vh; background: var(--bg-page)">
  <x-import component-from-global-scope="OZApp" from="./storefront/app-bundle.jsx" default-lang="{{ defaultLang }}" show-announcement="{{ showAnnouncement }}" hint-size="100%,2000px"></x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;defaultLang&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;en&quot;, &quot;he&quot;], &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;'en' | 'he'&quot;, &quot;section&quot;: &quot;Language&quot;}, &quot;showAnnouncement&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Header&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      defaultLang: this.props.defaultLang ?? 'en',
      showAnnouncement: this.props.showAnnouncement ?? true,
    };
  }
}
</script>
</body>
</html>
